            text-align: center;
            flex: 3;
            width: 100%;
            box-sizing: border-box;

        .sidebar {

            border: 1px solid var(--border-dark);
            padding: 20px;
            border-radius: 20px;
            flex: 1;
            width: 100%;

            transition: 0.2s;

            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;

        body.ltr .history-item {
            border-right: none;
            border-left: 4px solid var(--primary);
        }

            background-color: var(--border-dark);
            transform: translateX(-3px);
        }
        body.ltr .history-item:hover {
            transform: translateX(3px);
        }

            const email = document.getElementById("auth-email").value;
            const password = document.getElementById("auth-password").value;
            
            if(!email || !password) return alert("נא למלא את כל השדות");

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) return alert("שגיאת התחברות: " + error.message);
                
                currentUser = data.user;
                showAppUI();
                loadHistoryCloud();
            } catch (e) {
                alert("שגיאה בלתי צפויה: " + e.message);
            }
        }

        async function handleSignUp() {
            const email = document.getElementById("auth-email").value;
            const password = document.getElementById("auth-password").value;
            
            if(!email || !password) return alert("נא למלא את כל השדות");

            try {
                const { data, error } = await supabaseClient.auth.signUp({ email, password });
                if (error) return alert("שגיאת הרשמה: " + error.message);
                
                alert("נרשמת בהצלחה! במידה ונדרש אימות מייל, אנא בדוק את תיבת הדואר שלך.");
                if(data.user) {
                    currentUser = data.user;
                    showAppUI();
                    loadHistoryCloud();
                }
            } catch (e) {
                alert("שגיאה בלתי צפויה: " + e.message);
            }
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            currentUser = null;
            showAuthUI();
        }

        function changeLanguage(lang) {
            currentLang = lang;
            if(lang === "en") {
                document.documentElement.dir = "ltr";
                document.documentElement.lang = "en";
                document.body.classList.add("ltr");
            } else {
                document.documentElement.dir = "rtl";
                document.documentElement.lang = lang;
                document.body.classList.remove("ltr");
            }

            document.querySelectorAll("[data-key]").forEach(el => {
                const key = el.getAttribute("data-key");
                if(translations[lang][key]) el.innerText = translations[lang][key];
            });

            document.querySelectorAll("[data-placeholder]").forEach(el => {
                const key = el.getAttribute("data-placeholder");
                if(translations[lang][key]) el.placeholder = translations[lang][key];
            });

            if(currentUser) {
                const welcomeTxt = lang === "en" ? `Hello ${currentUser.email}! Choose a style, enter ingredients, or let the chef surprise you!` : 
                                   lang === "ar" ? `مرحباً ${currentUser.email}! اختر أسلوباً، أدخل المكونات أو دع الطاهي يفاجئك!` :
                                   `שלום ${currentUser.email}! בחר סגנון, רשמו מצרכים או תנו לשף להפתיע!`;
                document.getElementById("welcome-message").innerText = welcomeTxt;
            }
        }

        function setFilter(filterType, button) {
            currentFilter = filterType;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
        }

        function surpriseMe() {
            const randomIndex = Math.floor(Math.random() * surpriseIngredients.length);
            document.getElementById("ingredients").value = surpriseIngredients[randomIndex].join(", ");
        }

        async function checkAndIncrementLimit() {
            const today = new Date().toISOString().split('T')[0];
            const userId = currentUser.id;

            let { data, error } = await supabaseClient.from('user_profiles').select('*').eq('id', userId).single();
            if (error && error.code !== 'PGRST116') return true; 

            if (!data) {
                await supabaseClient.from('user_profiles').insert([{ id: userId, last_query_date: today, query_count: 1 }]);
                return true;
            }

            if (data.last_query_date === today) {
                if (data.query_count >= MAX_DAILY_RECIPES) return false; 
                await supabaseClient.from('user_profiles').update({ query_count: data.query_count + 1 }).eq('id', userId);
                return true;
            } else {
                await supabaseClient.from('user_profiles').update({ last_query_date: today, query_count: 1 }).eq('id', userId);
                return true;
            }
        }

        async function getRecipe(isRefresh = false) {
            let ingredientsInput = document.getElementById("ingredients").value;
            let recipeArea = document.getElementById("recipe-area");
            let resultDiv = document.getElementById("recipe-result");
            let metaDiv = document.getElementById("meta-tags");
            
            if (ingredientsInput.trim() === "") {
                alert(translations[currentLang].noIngredients);
                return;
            }

            recipeArea.style.display = "block";
            metaDiv.innerHTML = "";
            resultDiv.innerHTML = `<span class='loading-dots'>🥣 ${isRefresh ? translations[currentLang].loadingRefresh : translations[currentLang].loadingAI}</span>`;

            const statusAllowed = await checkAndIncrementLimit();
            if (!statusAllowed) {
                resultDiv.innerHTML = `<span style='color:#ff6b6b; font-weight:bold;'>${translations[currentLang].limitReached}</span>`;
                return;
            }

            let filterInstruction = currentFilter !== "הכל" ? ` The recipe category must be ${currentFilter}!` : "";
            let refreshInstruction = isRefresh ? " Give a completely different recipe than usual for these ingredients, be creative!" : "";
            let langName = currentLang === "en" ? "English" : currentLang === "ar" ? "Arabic" : "Hebrew";

            const promptText = `You are a creative chef. The user gave you these ingredients: "${ingredientsInput}".${filterInstruction}${refreshInstruction} 
            CRITICAL: You MUST write the entire response in ${langName}!
            Structure the response exactly like this:
            Recipe Name: [Name]
            Preparation Time: [e.g. 12 minutes]
            Difficulty: [Easy/Medium]
            Nutrition: [Calories]
            ---
            [Ingredients and preparation instructions here]`;

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: promptText }] }] })
                });
                
                const data = await response.json();
                if (data && data.candidates && data.candidates[0].content) {
                    let rawText = data.candidates[0].content.parts[0].text;
                    processAndDisplayRecipe(rawText);
                } else {
                    throw new Error("Data error");
                }
            } catch (e) { 
                console.error(e);
                resultDiv.innerHTML = `<span style='color:#ff6b6b;'>${translations[currentLang].errorOccurred}</span>`;
            }
        }

        function processAndDisplayRecipe(text, saveToCloud = true) {
            let resultDiv = document.getElementById("recipe-result");
            let metaDiv = document.getElementById("meta-tags");
            metaDiv.innerHTML = ""; 

            let titleMatch = text.match(/(?:Recipe Name|שם המתכון|اسم الوصفة):\s*(.*)/i);
            let timeMatch = text.match(/(?:Preparation Time|זמן הכנה|وقت التحضير):\s*(.*)/i);
            let difficultyMatch = text.match(/(?:Difficulty|רמת קושי|درجة الصعوبة):\s*(.*)/i);
            let nutritionMatch = text.match(/(?:Nutrition|ערכים תזונתיים|القيمة الغذائية):\s*(.*)/i);
            
            let recipeTitle = titleMatch ? titleMatch[1] : "Recipe";
            
            if (timeMatch) metaDiv.innerHTML += `<span class="tag">⏱️ ${timeMatch[1]}</span>`;
            if (difficultyMatch) metaDiv.innerHTML += `<span class="tag">📊 ${difficultyMatch[1]}</span>`;
            if (nutritionMatch) metaDiv.innerHTML += `<span class="tag">💪 ${nutritionMatch[1]}</span>`;

            let mainContent = text.split("---")[1] || text;
            
            mainContent = mainContent.replace(/(?:Recipe Name|שם המתכון|اسم الوصفة):.*\n?/gi, "")
                                     .replace(/(?:Preparation Time|זמן הכנה|وقت التحضير):.*\n?/gi, "")
                                     .replace(/(?:Difficulty|רמת קושי|درجة الصعوبة):.*\n?/gi, "")
                                     .replace(/(?:Nutrition|ערכים תזונתיים|القيمة الغذائية):.*\n?/gi, "");

            let formattedText = `<h3>${recipeTitle}</h3>` + mainContent;
            resultDiv.innerHTML = formattedText.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            
            if (saveToCloud) {
                saveToHistoryCloud(recipeTitle, text);
            }
        }

        async function saveToHistoryCloud(title, fullText) {
            const { error } = await supabaseClient.from('recipes').insert([{ user_id: currentUser.id, title: title, full_text: fullText }]);
            if (error) console.error(error);
            loadHistoryCloud();
        }

        async function loadHistoryCloud() {
            if(!currentUser) return;
            const historyList = document.getElementById("history-list");
            
            const { data, error } = await supabaseClient.from('recipes').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
            
            if (error) {
                console.error(error);
                historyList.innerHTML = `<li style="color: #ff6b6b; font-size: 13px;">שגיאה בטעינת מתכונים</li>`;
                return;
            }
            
            if (!data || data.length === 0) {
                historyList.innerHTML = `<li style="color: var(--text-muted); font-size: 13px;">${translations[currentLang].noRecipesCloud}</li>`;
                return;
            }
            
            historyList.innerHTML = "";
            data.forEach(recipe => {
                const wrapper = document.createElement("div");
                wrapper.className = "history-item-wrapper";
                
                const li = document.createElement("li");
                li.className = "history-item";
                li.innerText = recipe.title;
                li.onclick = () => processAndDisplayRecipe(recipe.full_text, false);
                
                const delBtn = document.createElement("button");
                delBtn.className = "delete-btn";
                delBtn.innerHTML = "🗑️";
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteRecipe(recipe.id);
                };
                
                wrapper.appendChild(li);
                wrapper.appendChild(delBtn);
                historyList.appendChild(wrapper);
            });
        }

        async function deleteRecipe(recipeId) {
            if(!confirm(translations[currentLang].confirmDelete)) return;
            const { error } = await supabaseClient.from('recipes').delete().eq('id', recipeId);
            if (error) alert(error.message);
            loadHistoryCloud();
        }
    </script>
